<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỆ THỐNG XÁC THỰC KEY</title>
    <script>
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            var day = now.getDate();
            var month = now.getMonth() + 1;
            var year = now.getFullYear();

            // Định dạng 2 chữ số
            hours = (hours < 10 ? "0" : "") + hours;
            minutes = (minutes < 10 ? "0" : "") + minutes;
            seconds = (seconds < 10 ? "0" : "") + seconds;

            // Đồng hồ tăng liên tục theo thời gian thực mỗi giây
            var timeString = hours + ":" + minutes + ":" + seconds;
            document.getElementById("clock").innerHTML = timeString;

            var dateString = `Hôm nay là ngày ${day}/${month}/${year}`;
            document.getElementById("dateDisplay").innerHTML = dateString;
            document.title = `Key Ngày ${day}/${month}/${year} Là`;

            // Gọi lại hàm sau đúng 1 giây để tăng thời gian tiếp tục
            setTimeout(updateTime, 1000);
        }

        function getQueryParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('ma');
            const keyInput = document.getElementById('keyInput');
            if (key) {
                keyInput.value = key;
            } else {
                keyInput.value = 'Không tìm thấy mã Key!';
            }
        }

        function copyToClipboard() {
            const keyInput = document.getElementById('keyInput');
            if (keyInput.value && keyInput.value !== 'Không tìm thấy mã Key!') {
                keyInput.select();
                keyInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                
                const notif = document.getElementById('notification');
                notif.style.display = 'block';
                setTimeout(() => { notif.style.display = 'none'; }, 2500);
            }
        }

        function toggleMusic() {
            const music = document.getElementById('backgroundMusic');
            const musicButton = document.getElementById('musicButton');

            if (music.paused) {
                music.play();
                musicButton.textContent = '⏸ Tạm Dừng Nhạc';
                musicButton.style.background = 'linear-gradient(45deg, #ef4444, #b91c1c)';
            } else {
                music.pause();
                musicButton.textContent = '🎵 Phát Nhạc Nền';
                musicButton.style.background = 'linear-gradient(45deg, #a855f7, #6366f1)';
            }
        }

        window.onload = function () {
            updateTime();
            getQueryParam();
        };
    </script>

            border-radius: 18px;

            100% { background-position: 0 0; }

            margin-bottom: 25px;

        }

        .key-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* Ô nhập liệu: Ép màu nền đen và chữ xanh cực nét, không bị lỗi trắng */
        input {
            text-align: center;
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background-color: #040307 !important;
            border: 2px solid #a855f7 !important;
            border-radius: 10px;
            font-size: 19px;
            font-weight: bold;
            color: #10b981 !important; /* Xanh lá Hacker */
            text-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #00f2fe !important;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        /* Nút bấm thiết kế bóng bẩy */
        button {
            width: 100%;
            color: #ffffff !important;
            padding: 13px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-copy {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
        }

        .btn-music {
            background: linear-gradient(45deg, #a855f7, #6366f1);
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-music:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        button:active {
            transform: translateY(1px);
        }

        #dateDisplay {
            margin-top: 15px;
            font-size: 14px;
            color: #9ca3af;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #4b5563;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .admin-link {
            color: #ff007f !important;
            text-decoration: none;
            font-weight: bold;
        }

        .admin-link:hover {
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.7);
        }

        #clock {
            color: #eab308 !important; /* Đồng hồ màu vàng rực */
            font-weight: bold;
        }

        .toast-notification {
            display: none;
            position: fixed;
            top: 20px;
            background: #10b981;
            color: white !important;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            animation: fadeIn 0.3s ease;
            z-index: 999;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
