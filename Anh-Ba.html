<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMAYBEOHUB — AUTH SYSTEM</title>
    <script>
        function updateTime() {
            var now = new Date();
            var hours = now.getHours();
            var minutes = now.getMinutes();
            var seconds = now.getSeconds();
            var day = now.getDate();
            var month = now.getMonth() + 1;
            var year = now.getFullYear();

            hours = (hours < 10 ? "0" : "") + hours;
            minutes = (minutes < 10 ? "0" : "") + minutes;
            seconds = (seconds < 10 ? "0" : "") + seconds;

            var timeString = hours + ":" + minutes + ":" + seconds;
            document.getElementById("clock").innerHTML = timeString;

            var dateString = `Hôm nay là ngày ${day}/${month}/${year}`;
            document.getElementById("dateDisplay").innerHTML = dateString;
            document.title = `Memaybeohub Key — Ngày ${day}/${month}/${year}`;

            setTimeout(updateTime, 1000);
        }

        // TỰ ĐỘNG BÓC TÁCH MÃ KEY TỪ LINK4M TRUYỀN VỀ QUA URL
        function getQueryParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('ma');
            const keyInput = document.getElementById('keyInput');
            if (key) {
                keyInput.value = key;
            } else {
                keyInput.value = 'Không tìm thấy mã Key!';
                keyInput.style.color = '#ef4444'; // Đổi sang màu đỏ nếu lỗi
            }
        }

        function copyToClipboard() {
            const keyInput = document.getElementById('keyInput');
            if (keyInput.value && keyInput.value !== 'Không tìm thấy mã Key!') {
                keyInput.select();
                keyInput.setSelectionRange(0, 99999);
                document.execCommand('copy');
                
                const notif = document.getElementById('notification');
                notif.style.display = 'block';
                setTimeout(() => { notif.style.display = 'none'; }, 2500);
            }
        }

        function toggleMusic() {
            const music = document.getElementById('backgroundMusic');
            const musicButton = document.getElementById('musicButton');

            if (music.paused) {
                music.play().catch(function(error) { console.log("Music play blocked by browser setup."); });
                musicButton.innerHTML = '<span>⏸</span> Tạm Dừng Nhạc';
                musicButton.style.background = 'linear-gradient(135deg, #ef4444, #991b1b)';
            } else {
                music.pause();
                musicButton.innerHTML = '<span>🎵</span> Phát Nhạc Nền';
                musicButton.style.background = 'linear-gradient(135deg, #8b5cf6, #4f46e5)';
            }
        }

        window.onload = function () {
            updateTime();
            getQueryParam();
        };
    </script>

        button {

            font-size: 15px;

            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button span {

        }

        .btn-copy {
            background: linear-gradient(135deg, #00f2fe, #0072ff);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.25);
        }

        .btn-music {

            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
        }

        button:active {
            transform: translateY(1px);
        }

        #dateDisplay {
            margin-top: 15px;
            font-size: 13px;
            color: #9ca3af;
            letter-spacing: 0.5px;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            color: #6b7280;
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .admin-link {
            color: #ff007f !important;
            text-decoration: none;
            font-weight: bold;
            transition: text-shadow 0.2s;
        }

        .admin-link:hover {
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
        }

        #clock {
            color: #eab308 !important; 
            font-weight: bold;
            text-shadow: 0 0 5px rgba(234, 179, 8, 0.2);
        }

        .toast-notification {
            display: none;
            position: fixed;
            top: 20px;
            background: #10b981;
            color: white !important;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 999;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
