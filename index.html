<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMAYBEOHUB - AUTH SYSTEM</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            width: 380px;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #a78bfa;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }
        .time-display {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 25px;
        }
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            background: #020617;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #00f2fe;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            box-sizing: border-box;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.3);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .notif {
            margin-top: 15px;
            font-size: 13px;
            color: #10b981;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ MEMAYBEOHUB GATEWAY</h1>
    <div id="dateDisplay" class="time-display">Đang tải thời gian...</div>
    
    <div class="input-box">
        <input type="text" id="keyInput" readonly value="Đang tìm mã Key...">
    </div>
    
    <button onclick="copyToClipboard()">📋 SAO CHÉP MÃ KEY</button>
    <div id="notification" class="notif">Đã sao chép Key thành công! Hãy vào game và dán.</div>
</div>

<script>
    function updateTime() {
        var now = new Date();
        var hours = now.getHours().toString().padStart(2, '0');
        var minutes = now.getMinutes().toString().padStart(2, '0');
        var seconds = now.getSeconds().toString().padStart(2, '0');
        var day = now.getDate().toString().padStart(2, '0');
        var month = (now.getMonth() + 1).toString().padStart(2, '0');
        var year = now.getFullYear();

        var dateString = "Hôm nay là ngày " + day + "/" + month + "/" + year + " - " + hours + ":" + minutes + ":" + seconds;
        document.getElementById("dateDisplay").innerHTML = dateString;
        setTimeout(updateTime, 1000);
    }

    // TỰ ĐỘNG BÓC TÁCH MÃ KEY TỪ LINK4M REDIRECT QUA URL (?ma=...)
    function getQueryParam() {
        const urlParams = new URLSearchParams(window.location.search);
        const key = urlParams.get('ma');
        const keyInput = document.getElementById('keyInput');
        
        if (key) {
            keyInput.value = key;
            keyInput.style.color = "#00f2fe";
        } else {
            keyInput.value = "Không tìm thấy mã Key hợp lệ!";
            keyInput.style.color = "#ef4444";
        }
    }

    function copyToClipboard() {
        const keyInput = document.getElementById('keyInput');
        if (keyInput.value && keyInput.value !== "Không tìm thấy mã Key hợp lệ!" && keyInput.value !== "Đang tìm mã Key...") {
            keyInput.select();
            keyInput.setSelectionRange(0, 99999);
            document.execCommand('copy');
            
            const notif = document.getElementById('notification');
            notif.style.display = 'block';
            setTimeout(() => { notif.style.display = 'none'; }, 2500);
        }
    }

    window.onload = function() {
        updateTime();
        getQueryParam();
    };
</script>

</body>
</html>
