<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMAYBEOHUB - SYSTEM SECURE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; width: 380px; }
        h1 { font-size: 20px; color: #a78bfa; margin-bottom: 25px; text-shadow: 0 0 10px rgba(167, 139, 250, 0.5); }
        input { width: 100%; padding: 12px 15px; background: #020617; border: 1px solid #334155; border-radius: 8px; color: #ef4444; font-family: monospace; font-size: 14px; box-sizing: border-box; text-align: center; outline: none; margin-bottom: 20px; }
        button { width: 100%; padding: 12px; background: linear-gradient(90deg, #6366f1, #a855f7); border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛡️ MEMAYBEOHUB GATEWAY</h1>
    <input type="text" id="keyInput" readonly value="Đang thẩm định chứng chỉ máy chủ...">
    <button onclick="copyToClipboard()">📋 SAO CHÉP MÃ KEY</button>
</div>

<script>
    let currentDatabaseUrl = ""; 

    async function resolveKey() {
        const urlParams = new URLSearchParams(window.location.search);
        const anonymousID = urlParams.get('id') || urlParams.get('ID');
        const keyInput = document.getElementById('keyInput');
        
        if (!anonymousID) { 
            keyInput.value = "❌ Lỗi: Không tìm thấy ID định danh!"; 
            return; 
        }
        
        try {
            // ĐÃ FIX: Xóa bỏ mục "keys/" để trỏ thẳng tới thư mục gốc Firebase giống như script Roblox lưu
            currentDatabaseUrl = `https://keyvip-eeae4-default-rtdb.firebaseio.com/${anonymousID}.json`;
            const response = await fetch(currentDatabaseUrl);
            const data = await response.json();
            
            if (data && data.mapsTo) {
                keyInput.value = data.mapsTo;
                keyInput.style.color = "#00f2fe";
            } else {
                keyInput.value = "❌ ID này không tồn tại hoặc đã hết hạn!";
            }
        } catch (error) { 
            keyInput.value = "❌ Lỗi xác minh dữ liệu!"; 
        }
    }

    async function copyToClipboard() {
        const keyInput = document.getElementById('keyInput');
        
        // ĐÃ FIX: Không bắt lỗi cứng chữ "Key_" nữa. Chỉ cần không phải thông báo lỗi (độ dài text hợp lệ) là cho copy.
        if (keyInput.value && !keyInput.value.startsWith("❌") && keyInput.value !== "Đang thẩm định chứng chỉ máy chủ...") {
            try {
                await navigator.clipboard.writeText(keyInput.value);
                alert("🎉 Đã sao chép Key thành công! Hãy quay lại game để kích hoạt.");
                
                // Thực hiện xóa ID liên kết trên Firebase sau khi copy thành công để tránh dọn rác thủ công
                if (currentDatabaseUrl !== "") {
                    fetch(currentDatabaseUrl, { method: 'DELETE' });
                }
            } catch (err) {
                keyInput.select();
                document.execCommand('copy');
                alert("🎉 Đã sao chép Key thành công!");
                if (currentDatabaseUrl !== "") {
                    fetch(currentDatabaseUrl, { method: 'DELETE' });
                }
            }
        } else {
            alert("❌ Không có mã Key hợp lệ để sao chép!");
        }
    }

    window.onload = resolveKey;
</script>
</body>
</html>
